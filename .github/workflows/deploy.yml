name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: vtesitaly
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_API_KEY }}

      - name: Deploy via scp
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p 2299 136.243.45.246 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -P 2299 -r dist/* "${SSH_USER}@136.243.45.246:/home/${SSH_USER}/public_html/"
