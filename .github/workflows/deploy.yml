name: CI

# Single workflow per commit: ci → lighthouse → deploy.
# Lighthouse and deploy reuse the dist/ artifact uploaded by `ci`, so the
# whole build pipeline runs only once per push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Gate that runs on both PR and push: lint/format/typecheck/test/build/smoke.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Audit only on push to main; PR contributors can't fix transitive
      # vulnerabilities anyway and it adds 10s to every PR run.
      - if: github.event_name == 'push'
        run: npm audit --omit=dev

      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm test
      - run: npm run build
        env:
          NODE_ENV: production

      - run: npx vitest run --config vitest.integration.config.ts

      - name: Enforce dist size budget
        run: |
          SIZE_MB=$(du -sm dist | cut -f1)
          echo "dist artifact: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 80 ]; then
            echo "::error::dist is ${SIZE_MB}MB, above the 80MB budget. Optimise images or split."
            exit 1
          fi

      - name: Upload dist artifact (shared with lighthouse + deploy)
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  lighthouse:
    # Lighthouse is a deploy gate, not a PR gate — it adds ~2 min and the
    # findings are mostly stable across small content changes. PR feedback
    # comes from `ci` (lint/test/build/smoke); Lighthouse runs only on the
    # push that's about to deploy.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true

  deploy:
    needs: [ci, lighthouse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: vtesitaly
    steps:
      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy via tar-over-ssh + targeted orphan cleanup
        # The shared-hosting VPS has no rsync, no sudo, no package manager.
        # Strategy:
        #   1. Stream a single gzipped tarball through one SSH connection
        #      (~5x faster than scp -r per-file).
        #   2. Tar overwrites + adds files but never deletes — so the
        #      server's manually-managed files survive: .htaccess, the
        #      legacy data/ docs/ blog/ dirs, the .jpeg favicon variants,
        #      and anything else that isn't in `dist/`.
        #   3. Prune ONLY orphans inside _astro/ and pagefind/ — both are
        #      built-from-scratch every time with content-addressed names,
        #      so old hashes accumulate forever otherwise. Other dirs like
        #      api/, en/, gp/ are NOT pruned: they may contain legitimate
        #      non-Astro files.
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
        run: |
          set -euo pipefail
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH=(ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}")
          DEST="/home/${SSH_USER}/public_html"

          # --- 0. guard against overwriting user-managed dirs ---
          # The server keeps `data/`, `docs/`, and `blog/` as user-managed
          # directories outside Astro's control. If somebody ever adds an
          # Astro page under src/pages/{data,docs,blog}/ the build would
          # generate dist/{data,docs,blog}/ and the tar extract below would
          # silently overwrite live user content. Fail loud here instead.
          for reserved in data docs blog; do
            if [ -d "dist/$reserved" ]; then
              echo "::error::dist/ contains '$reserved/' but it's a user-managed directory on the server."
              echo "::error::Deploying would overwrite live content. Rename src/pages/$reserved/ first."
              exit 1
            fi
          done

          # --- 1. ship the tarball ---
          BEFORE_KB=$(du -sk dist | cut -f1)
          echo "shipping ${BEFORE_KB} KB (uncompressed) of dist/ as a single gzipped stream"
          tar -C dist -czf - . | "${SSH[@]}" "tar -C '$DEST' -xzf -"

          # --- 2. orphan cleanup (only in fully-managed dirs) ---
          for managed in _astro pagefind; do
            [ -d "dist/$managed" ] || continue
            EXPECTED_FILES=$(find "dist/$managed" -type f | wc -l)
            if [ "$EXPECTED_FILES" -lt 5 ]; then
              echo "skip cleanup of $managed/: only $EXPECTED_FILES files in dist (sanity guard)"
              continue
            fi

            ( cd "dist/$managed" && find . -type f | sort ) > "/tmp/want-$managed.txt"
            "${SSH[@]}" "cd '$DEST/$managed' 2>/dev/null && find . -type f | sort" \
              > "/tmp/have-$managed.txt" || true

            comm -23 "/tmp/have-$managed.txt" "/tmp/want-$managed.txt" \
              > "/tmp/orphans-$managed.txt"
            ORPHAN_COUNT=$(wc -l < "/tmp/orphans-$managed.txt" | tr -d ' ')

            if [ "$ORPHAN_COUNT" -gt 0 ]; then
              echo "pruning $ORPHAN_COUNT orphan file(s) from $managed/"
              {
                echo "set -e"
                echo "cd '$DEST/$managed'"
                # filenames are Astro-generated content hashes (no spaces, no
                # quotes), but single-quote them anyway for defence in depth.
                sed "s|^|rm -f '|; s|\$|'|" "/tmp/orphans-$managed.txt"
              } | "${SSH[@]}" "bash -s"
            else
              echo "$managed/ is clean, no orphans"
            fi
          done
