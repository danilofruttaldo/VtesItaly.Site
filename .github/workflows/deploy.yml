name: CI

# Single workflow per commit: ci → lighthouse → deploy.
# Lighthouse and deploy reuse the dist/ artifact uploaded by `ci`, so the
# whole build pipeline runs only once per push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Gate that runs on both PR and push: lint/format/typecheck/test/build/smoke.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Audit only on push to main; PR contributors can't fix transitive
      # vulnerabilities anyway and it adds 10s to every PR run.
      - if: github.event_name == 'push'
        run: npm audit --omit=dev

      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm test
      - run: npm run build
        env:
          NODE_ENV: production

      - run: npx vitest run --config vitest.integration.config.ts

      - name: Enforce dist size budget
        run: |
          SIZE_MB=$(du -sm dist | cut -f1)
          echo "dist artifact: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 80 ]; then
            echo "::error::dist is ${SIZE_MB}MB, above the 80MB budget. Optimise images or split."
            exit 1
          fi

      - name: Upload dist artifact (shared with lighthouse + deploy)
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  lighthouse:
    # Lighthouse is a deploy gate, not a PR gate — it adds ~2 min and the
    # findings are mostly stable across small content changes. PR feedback
    # comes from `ci` (lint/test/build/smoke); Lighthouse runs only on the
    # push that's about to deploy.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true

  deploy:
    needs: [ci, lighthouse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: vtesitaly
    steps:
      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy via rsync
        # rsync transfers only files whose checksum or mtime changed, with
        # zlib compression on the wire. Typical speed-up vs `scp -r`: 5–10×
        # on incremental deploys (the static asset bulk doesn't move). The
        # first deploy after this change still ships everything once.
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync \
            --archive --compress --delete --human-readable --stats \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT" \
            dist/ "${SSH_USER}@${SSH_HOST}:/home/${SSH_USER}/public_html/"
