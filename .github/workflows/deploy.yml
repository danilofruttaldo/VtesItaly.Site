name: CI

# Single workflow per commit: ci → lighthouse → deploy.
# Lighthouse and deploy reuse the dist/ artifact uploaded by `ci`, so the
# whole build pipeline runs only once per push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-ref group so a Dependabot burst of PRs doesn't cancel each other in
  # the queue (default queue depth is 1 in-progress + 1 queued). The deploy
  # job only runs on push to main where ref collapses to the same group.
  group: deploy-vtesitaly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Gate that runs on every push: lint/format/typecheck/test/build/smoke.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm audit --omit=dev

      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run test:coverage
      - run: npm run build
        env:
          NODE_ENV: production

      - run: npx vitest run --config vitest.integration.config.ts

      - name: Enforce dist size budget
        # Use apparent size (real bytes) instead of disk-allocated blocks: on
        # Linux ext4 the 4KB-block overhead across hundreds of small files adds
        # ~3MB that doesn't ship to the CDN. Matches the integration test's
        # statSync-based measurement (tests/integration/build-output.test.ts).
        run: |
          SIZE_MB=$(du --apparent-size -sm dist | cut -f1)
          echo "dist artifact: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 80 ]; then
            echo "::error::dist is ${SIZE_MB}MB, above the 80MB budget. Optimise images or split."
            exit 1
          fi

      - name: Upload dist artifact (shared with lighthouse + deploy)
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  lighthouse:
    # Lighthouse is a deploy gate. Reuses the dist artifact from ci so a
    # lighthouse rerun doesn't redo lint/test/build.
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true

  deploy:
    needs: [ci, lighthouse]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: vtesitaly
      url: https://vtesitaly.com
    steps:
      - name: Download dist artifact from ci
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy via tar-pipe over SSH
        # Single SSH session, gzip-streamed tarball extracted in place.
        # Additive (like scp) — never deletes user-managed files (.htaccess).
        # Trade-off vs lftp: no delta, uploads everything each run. Accepted
        # because shared hosting throttles parallel SFTP, and Astro's content
        # hashes mean most files change anyway on rebuild.
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
        run: |
          set -euo pipefail
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key

          # Pin the host key from secrets (TOFU-free). Generate locally with
          # `ssh-keyscan -p $PORT $HOST` and store as the SSH_KNOWN_HOSTS
          # secret. Falls back to runtime keyscan only if the secret isn't
          # set yet, which leaves a one-shot MITM window — set the secret.
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "::warning::SSH_KNOWN_HOSTS not set; falling back to ssh-keyscan (MITM window)."
            ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

          tar -C dist -cz . | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" "tar -C /home/$SSH_USER/public_html -xz"
